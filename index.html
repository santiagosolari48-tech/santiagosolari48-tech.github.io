<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7500426906784906" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿De qué barrio de CABA sos?</title>
    <style>
    :root {
        --afa-blue:#F4A20B;
        --celeste: #F4C90B;
        --text: #1a252f;
        --oro: #f1c40f;
        
        /* Colores del Fileteado Pergamino Tradicional */
        --filete-text-red: #7A1E1E;
        --filete-gold-shadow: #D4AF37;
        --filete-bg-crema: #f5ebd6;
        --filete-border-dark: #4A1212;
    }

    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', Roboto, sans-serif; 
    }

    body { 
        margin: 0; 
        padding: 0; 
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
        display: flex;
        flex-direction: column; 
        align-items: center;
        padding-top: 100px; 
        padding-bottom: 40px;
        background: url('imágenes/fondo-buenos-aires.png') no-repeat top center fixed;
        background-size: cover; 
    }

    /* 🚀 CONTENEDOR DE STICKERS FLOTANTES */
    .stickers-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5; 
        pointer-events: none;
    }

    .floating-sticker {
        position: absolute;
        bottom: -90px; 
        height: 90px; 
        width: auto;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        animation: subir-cielo 10s linear infinite;
    }

    @keyframes subir-cielo {
        0% { bottom: -90px; transform: translateX(0) rotate(0deg); opacity: 1; }
        15% { opacity: 0.9; }
        85% { opacity: 0.9; }
        100% { bottom: 110vh; transform: translateX(20px) rotate(360deg); opacity: 1; }
    }

    .st-chori { left: 13%; animation-duration: 7s; animation-delay: 0s; }
    .st-chorizo { left: 66%; animation-duration: 8s; animation-delay: 4s; }
    .st-trucaso { left: 75%; animation-duration: 10s; animation-delay: 0s; }
    .st-truco { left: 45%; animation-duration: 7s; animation-delay: 4s; }
    .st-mate  { left: 78%; animation-duration: 7s; animation-delay: 1s; }
    .st-mate-2  { left: 2%; animation-duration: 9s; animation-delay: 3s; }
    .st-obelisco  { left: 88%; animation-duration: 10s; animation-delay: 4s; }
    .st-obeliscos  { left: 11%; animation-duration: 5s; animation-delay: 6s; }
    .st-copa { left: 28%; animation-duration: 9s; animation-delay: 2s; }

    /* 📦 CUADRO DEL TEST TRADICIONAL */
    .container { 
        background: rgba(255, 255, 255, 0.98); 
        max-width: 500px; 
        width: 90%; 
        padding: 25px; 
        border-radius: 24px; 
        border: 4px solid var(--celeste);
        box-shadow: 0 15px 35px rgba(11, 83, 148, 0.25); 
        text-align: center; 
        position: relative;
        z-index: 10; 
        margin: 0 auto 20px auto;
        transition: background 0.3s ease, border 0.3s ease;
        overflow: hidden; 
    }

    /* 🎨 ESTILO FILETEADO PORTEÑO TRADICIONAL */
    .container.fileteado-active {
        background: linear-gradient(135deg, #fbf4e6 0%, var(--filete-bg-crema) 100%) !important;
        border: 6px double var(--filete-border-dark) !important;
        outline: 3px solid var(--filete-gold-shadow);
        outline-offset: -14px;
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(0,0,0,0.4);
        padding: 40px 28px;
    }

    /* 🖼️ MARCOS DEL FILETEADO */
    .filete-corner {
        display: none;
        position: absolute;
        width: 60px;  
        height: auto;
        pointer-events: none;
        z-index: 11;
        outline: none;
        border: none;
    }
    
    .container.fileteado-active .filete-corner {
        display: block;
    }
    
    /* Corregido: quitamos los transform viejos para que tus imágenes nuevas no se den vuelta */
    .corner-tl { top: 5px; left: 5px; }
    .corner-tr { top: 5px; right: 5px; }
    .corner-bl { bottom: 5px; left: 5px; }
    .corner-br { bottom: 5px; right: 5px; }

    .filete-subtitle {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-style: italic;
        font-size: 20px;
        color: #2c3e50;
        margin-bottom: 15px;
        font-weight: 500;
    }

    .container.fileteado-active h1 {
        font-family: 'Georgia', 'Times New Roman', serif;
        color: var(--filete-text-red) !important;
        text-shadow: 1px 1px 0px var(--filete-gold-shadow), 2px 2px 2px rgba(0,0,0,0.2) !important;
        font-weight: 900;
        letter-spacing: 0.5px;
    }
    
    .container.fileteado-active p {
        color: #3e4a56 !important;
        font-family: 'Segoe UI', sans-serif;
        font-weight: 500;
        font-size: 16px;
    }

    .container.fileteado-active .btn-start {
        background: linear-gradient(180deg, #ca9e4a 0%, #8e6623 100%) !important;
        border: 2px solid var(--filete-border-dark) !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 5px 12px rgba(0,0,0,0.3);
        color: #fff !important;
        font-family: 'Georgia', serif;
        font-style: italic;
        font-size: 22px;
        font-weight: 500;
        text-transform: none;
        border-radius: 12px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        padding: 14px;
    }
    .container.fileteado-active .btn-start:hover {
        background: linear-gradient(180deg, #dbae56 0%, #9e752d 100%) !important;
    }

    h1 { font-size: 26px; margin-bottom: 12px; color: var(--afa-blue); font-weight: 900; letter-spacing: -0.5px; line-height: 1.2; }
    p { margin-bottom: 20px; font-size: 15px; line-height: 1.4; color: #566573; }

    .btn { display: block; width: 100%; padding: 18px; margin-bottom: 10px; background: #f8f9f9; border: 2px solid #d5dbdb; border-radius: 12px; font-size: 15px; font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.1s ease; text-align: left; }
    .btn:hover { border-color: var(--celeste); background: #ebf5fb; }

    .btn-start { text-align: center; background: var(--afa-blue); color: white; border: none; font-size: 18px; text-transform: uppercase; font-weight: 800; }
    .btn-start:hover { background: #073763; }

    .progress-bar { width: 100%; height: 8px; background: #eaeded; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
    .progress { height: 100%; background: var(--afa-blue); width: 0%; transition: width 0.2s ease; }
    .hidden { display: none; }

    .loading-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 10px; }
    .loading-gif { width: 180px; height: auto; margin-bottom: 20px; }
    .loading-text { font-size: 20px; font-weight: 800; color: var(--afa-blue); text-transform: uppercase; letter-spacing: 0.5px; }

    .result-layout { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
    .result-tag { font-size: 14px; font-weight: 900; color: #2c3e50; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-family: 'Georgia', serif; font-style: italic; }
    .result-title { font-size: 32px; color: var(--filete-text-red) !important; margin-bottom: 15px; font-weight: 900; text-shadow: 1px 1px 0px var(--filete-gold-shadow) !important; font-family: 'Georgia', serif; }

    .speech-bubble { position: relative; background: rgba(255, 255, 255, 0.95); border: 2px solid var(--filete-border-dark); border-radius: 16px; padding: 18px; font-size: 16px; line-height: 1.4; font-weight: 600; color: #2c3e50; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); text-align: center; width: 100%; }

    .adsense-space { background: #f2f4f4; border: 1px dashed #bdc3c7; padding: 15px 5px; margin-top: 15px; width: 100%; min-height: 100px; display: flex; align-items: center; justify-content: center; }
    
    .bg-text-arg { position: fixed; top: 60px; left: -20px; font-size: 230px; font-weight: 900; color: rgba(0, 50, 150, 0.03); font-family: 'Arial Black', Impact, sans-serif; z-index: 3; pointer-events: none; user-select: none; transform: rotate(-15deg); }

    #feedback-container {
        margin-top: 25px;
        background: #fdfefe;
        border: 3px solid #eaeded;
        border-radius: 16px;
        padding: 15px;
        width: 100%;
        text-align: left;
        box-shadow: 0 4px 8px rgba(0,0,0,0.03);
    }
    #feedback-container h3 { font-size: 18px; color: var(--afa-blue); margin-bottom: 10px; font-weight: 800; }
    #feedback-container p { font-size: 13px; color: #7f8c8d; margin-bottom: 12px; line-height: 1.3; }
    #user-opinion { width: 100%; height: 80px; border: 2px solid #eaeded; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; color: #2c3e50; resize: none; margin-bottom: 10px; }
    .btn-opinion { background: #fff; color: var(--afa-blue); border: 2px solid var(--afa-blue); width: 100%; padding: 12px; font-size: 14px; text-align: center; }

    /* 🍪 ESTILOS DEL CARTEL DE COOKIES */
    .cookie-banner {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 500px;
        background: rgba(26, 37, 47, 0.98);
        color: #ffffff;
        padding: 15px 20px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 9999; 
        text-align: center;
        border: 2px solid var(--celeste);
    }
    .cookie-banner p {
        font-size: 13px;
        line-height: 1.4;
        color: #e5e7eb;
        margin: 0;
    }
    .cookie-banner button {
        background: var(--afa-blue);
        color: white;
        border: none;
        padding: 8px 24px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
    }
    .cookie-banner button:hover {
        background: #073763;
    }

    /* 📱 VISTA EN CELULARES */
    @media (max-width: 600px) {
        body { padding-top: 120px; } 
        .filete-corner { width: 45px; }
        .container { width: 88%; padding: 18px; } 
        .container.fileteado-active { padding: 35px 20px; }
        h1 { font-size: 21px; }
        .btn { font-size: 14px; padding: 14px; }
    }
    </style>
</head>
<body>

<div class="bg-text-arg">ARG</div>

<div id="stickers" class="stickers-container">
    <img src="imágenes/chori.png" class="floating-sticker st-chori">
    <img src="imágenes/chorizo.png" class="floating-sticker st-chorizo">
    <img src="imágenes/trucaso.png" class="floating-sticker st-trucaso">
    <img src="imágenes/truco.png" class="floating-sticker st-truco">
    <img src="imágenes/mateico.png" class="floating-sticker st-mate">
    <img src="imágenes/obelisco.png" class="floating-sticker st-obelisco">
    <img src="imágenes/obeliscos.png" class="floating-sticker st-obeliscos">
    <img src="imágenes/copa.png" class="floating-sticker st-copa">
</div>

<div id="main-container" class="container fileteado-active">
    <img src="imágenes/fileteado.png" class="filete-corner corner-tl" alt="Fileteado Superior Izquierdo">
    <img src="imágenes/fileteado2.png" class="filete-corner corner-tr" alt="Fileteado Superior Derecho">
    <img src="imágenes/fileteado3.png" class="filete-corner corner-bl" alt="Fileteado Inferior Izquierdo">
    <img src="imágenes/fileteado4.png" class="filete-corner corner-br" alt="Fileteado Inferior
